version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: research_os
      POSTGRES_USER: ros_user
      POSTGRES_PASSWORD: ros_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/migration/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql
      - ../../scripts/migration/002_add_users.sql:/docker-entrypoint-initdb.d/002_add_users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ros_user -d research_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      grobid:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ros_user:ros_pass@postgres:5432/research_os
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      GROBID_URL: http://grobid:8070
    env_file:
      - ../../.env
    volumes:
      - ../..:/app
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
